<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>м—°л§җм •мӮ° - л¶Җм–‘к°ҖмЎұ л“ұлЎқ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-light">
  <div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow">
      <div class="card-header bg-success text-white">
        <h5 class="mb-0">рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘§вҖҚрҹ‘Ұ мқём Ғкіөм ң л¶Җм–‘к°ҖмЎұ л“ұлЎқ</h5>
      </div>
      <div class="card-body">
        <form id="dependentForm">
          <div class="mb-3">
            <label class="form-label">кҙҖкі„</label>
            <select id="relation" class="form-select">
              <option value="л°°мҡ°мһҗ">л°°мҡ°мһҗ</option>
              <option value="м§Ғкі„л№„мҶҚ(мһҗл…Җ)">м§Ғкі„л№„мҶҚ(мһҗл…Җ)</option>
              <option value="м§Ғкі„мЎҙмҶҚ(л¶ҖлӘЁ)">м§Ғкі„мЎҙмҶҚ(л¶ҖлӘЁ)</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">мқҙлҰ„</label>
            <input type="text" id="name" class="form-control" required>
          </div>
          </div>
          <div class="mb-3">
            <label class="form-label">мЈјлҜјл“ұлЎқлІҲнҳё</label>
            <input type="text" id="identityNo" class="form-control" required>
          </div>
          </div>
          <div class="mb-3 form-check">
            <input type="text" id="isPathfinder" class="form-check-input" value="Y">
            <label class="form-check-label">л§Ң 70м„ё мқҙмғҒ кІҪлЎңмҡ°лҢҖ лҢҖмғҒмһҗ</label>
          </div>
          </div>
          
          <input type="hidden" id="jobId" value="1234">
          <button type="button" id="btnSubmit" class="btn btn-success w-100">л¶Җм–‘к°ҖмЎұ м¶”к°Җ</button>
        </form>
      </div>
    </div>
  </div>
  <script>
    $(document).ready(function() {
      $('#btnSubmit').click(function() {
        let isChecked = $("#isPathfinder").is(":checked") ? "Y" : "N";

        $.ajax({
          url: '/api/dependent/add',
          type: 'POST',
          data: {
            jobId: $("#jobId").val(),
            relation: $("#relation").val(),
            name: $("#name").val(),
            identityNo: $("#identityNo").val(),
            isPathfinder: isChecked
          },
          success: function(res) {
            alert(res);
            $("#dependentForm")[0].reset();
          },
          error: function() {
            alert("л“ұлЎқ мӢӨнҢЁ");
          }
        })
      })
    })
  </script>
</body>
</html>

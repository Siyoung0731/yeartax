<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사내 연말정산 - 수동 영수증 업로드</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-light">
  <div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h5 class="card-title mb-0">🧾 국세청 누락 영수증 수동 제출</h5>
      </div>
      <div class="card-body p-4">
        <p class="text-muted mb-4">안경 구입비, 기부금, 월세 등의 간소화 서비스에 나오지 않는 영수증을 올려주세요. 재무팀 확인 후 예상 환급액에 반영됩니다.</p>

        <form id="evidenceForm">
          <div class="mb-3">
            <label for="category" class="form-label fw-bold">증빙 항목</label>
            <select id="category" class="form-selet">
              <option value="안경비">안경/콘텍트렌즈 구입비</option>
              <option value="기부금">기부금 영수증</option>
              <option value="월세">월세 납입 증명서</option>
              <option value="교복비">중/고등학생 교복 구입비</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="amount" class="form-label fw-bold">영수증 금액(원)</label>
            <input type="number" id="amount" class="form-control" placeholder="예: 150000 (숫자만 입력)" required>
          </div>

          <div class="mb-4">
            <label for="receiptImage" class="form-label fw-bold">영수증 사진 첨부</label>
            <input type="file" id="receiptImage" class="form-control" accept="image/*, .pdf" required>
            <div class="form-text">스마트폰으로 찍은 사진(JPG, PNG)이나 PDF파일을 올려주세요.</div>
          </div>

          <input type="hidden" id="empNo" value="EMP_2026_001">
          <input type="hidden" id="jobId" value="1234">

          <button type="button" id="btnSubmitEvidence" class="btn btn-primary w-100 py-2">
            결제 올리기
          </button>
        </form>
      </div>
    </div>
    <div class="mt-3">
      <a href="/" class="btn btn-outline-secondary">&larr; 메인 로비로 돌아가기</a>
    </div>
  </div>
  
  <script>
    $(document).ready(function() {
      $("#btnSubmitEvidence").click(function() {
        // 1. 유효성 검사(빈칸 확인)
        if(!$("#amount").val() || !$("#receiptImage").val()) {
          alert("금액과 영수증 사진을 모두 첨부해주세요.");
          return;
        }
        // 2. 폼 데이터 포장(파일 업로드를 위한 FormData 객체 사용)
        let formData = new FormData();
        formData.append("category", $("#category").val());
        formData.append("amount", $("#amount").val());
        formData.append("file", $("#receiptImage")[0].files[0]);      // 파일 자체를 저장
        
        // 3. 버튼 비활성화(중복 클릭 방지)
        let $btn = $(this);
        let originalBtnText = $btn.text();
        $btn.prop("disabled", true).text("업로드 중...");

        // 4. Ajax 비동기 통신으로 Spring boot 서버에 데이터 전송
        $.ajax({
          url : "/api/evidence/upload",
          type : "POST",
          headers: {
            "Authorization": "Bearer " + localStorage.getItem("jwtToken")
          },
          data : formData,
          processData : false,      //JQuery 가 데이터를 문자열로 바꾸지 않도록 설정(파일 전송 필수)
          contentType : false,       //브라우저가 알아서 multipart/form-data로 설정하도록 false 지정(파일 전송 필수)

          success: function(res) {
            //서버에서 성공 응답이 왔을 때
            alert(res);
            window.location.href = "/";
          },
          error: function(xhr) {
            //서버에서 에러가 났을 때
            alert("업로드 실패: " + xhr.res);
          },

          complete: function() {
            //성공하든 실패하든 마지막에 버튼을 원래대로 복구
            $btn.prop("disabled", false).text(originalBtnText);
          }
        });
      });
    });
  </script>
</body>
</html>

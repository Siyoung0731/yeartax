<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정산 최종 마감</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-light">
  <div class="container mt-5" style="max-width: 720px;">
    <div class="card shadow-sm">
      <div class="card shadow-sm">
        <div class="card-header bg-danger text-white">
          <h4 class="mb-0">🧾 [관리자 전용] 정산 최종 마감</h4>
        </div>

        <div class="card-body">
          <p class="text-muted">
            제출 완료 상태(SUBMITTED)의 사원 정산만 최종 마감할 수 있습니다.
          </p>

          <div class="input-group mb-3">
            <input type="text" id="jobId" class="form-control" placeholder="마감할 사번 입력">
            <button class="btn btn-danger" onclick="finalizeTax()">최종 마감</button>
          </div>

          <div class="alert alert-warning small mb-0">
            최종 마감 후에는 사원이 PDF, 부양가족, 영수증 정보를 수정할 수 없습니다.
          </div>
          <div class="mt-4">
            <button class="btn btn-primary" onclick="downloadExcel()">📊 전체 정산결과 엑셀 다운로드</button>
          </div>
        </div>
      </div>

    </div>
    <div class="mt-3">
      <a href="/" class="btn btn-outline-secondary">← 메인 로비로 돌아가기</a>
    </div>
  </div>

  <script>
    function downloadExcel() {
      //Ajax가 아닌, URL 직접 이동 방식으로 호출해야 파일 다운로드가 실행됨
      window.location.href = '/api/admin/export/excel';
    }

    function finalizeTax() {
      const jobId = $("#jobId").val().trim();

      if(!jobId) {
        alert("사번을 입력해주세요.");
        return;
      }

      if(!confirm(jobId + " 사원의 연말정산을 최종 마감하시겠습니까?")) {
        return;
      }

      $.ajax({
        url: "/api/tax/admin/finalize/" + jobId,
        type: "POST",
        headers: {
          "Authorization": "Bearer " + localStorage.getItem("jwtToken")
        },
        success: function(res) {
          alert(res);
          $("#jobId").val("");
        },
        error: function(xhr) {
          alert("최종 마감 실패: " + xhr.res);
        } 
      });
    }
  </script>
</body>
</html>

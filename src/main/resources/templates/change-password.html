<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 변경</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-light">
  <div class="container mt-5" style="max-width: 420px;">
    <div class="car p-4 shadow-sm">
      <h4 class="mb-3">비밀번호 변경</h4>
      <p class="text-muted">초기 비밀번호로 로그인했습니다. 새 비밀번호로 변경해주세요.</p>

      <div class="mb-3">
        <label class="form-label">새 비밀번호</label>
        <input type="password" id="newPassword" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-lable">새 비밀번호 확인</label>
        <input type="password" id="confirmPassword" class="form-control">
      </div>

      <button type="button" class="btn btn-primary w-100" onclick="changePassword()">변경하기</button>
    </div>
  </div>
  <script>
    function changePassword() {
      const newPassword = $('#newPassword').val();
      const confirmPassword = $('#confirmPassword').val();

      if(!newPassword || !confirmPassword) {
        alert("비밀번호를 입력해주세요.");
        return;
      }
      // 새 비번과 새 비번 확인이 일치한지
      if(newPassword !== confirmPassword) {
        alert("비밀번호가 일치하지 않습니다.")
        return;
      }
      // <button type="button">/contentType: "application/json" / data: JSON.stringify({newPassword: newPassword})
      // 이 세개 중에 하나라도 빠지면 Required request body is missing 같은 에러 발생
      // Ajax 
      $.ajax({
        url: "/api/change-password",
        type: "POST",
        contentType: "application/json",
        headers: {
          "Authorization": "Bearer " + localStorage.getItem('jwtToken')
        },
        data: JSON.stringify({
          newPassword: newPassword
        }),
        success: function() {
          alert("비밀번호가 변경되었습니다. 다시 로그인해주세요. ");
          localStorage.getItem('jwtToken');
          window.location.href = "/login";
        },
        error: function(xhr) {
          alert("비밀번호 변경 실패: " + xhr.responseText);
        }
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>연말정산 - 간소화 PDF 제출</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-light">
  <div class="container mt-5" style="max-width: 550px">
  <div class="card shadow-sm border-primary">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0">📄 국세청 간소화 PDF 업로드</h5>
    </div>

      <div class="card-body p-4 text-center">
        <p class="text-start text-muted">
          국세청 홈택스에서 다운로드한 연말정산 간소화 PDF 파일을 업로드해주세요.
        </p>

        <div class="border border-dashed p-5 my-4 bg-white rounded" id="dropZone">
          <input type="file" id="pdfFile" class="form-control" accept=".pdf" required>
          <div class="mt-2 text-secondary small">확장자가 .pdf 인 파일만 등록 가능합니다.</div>
        </div>

        <button type="button" id="btnUploadPdf" class="btn btn-primary w-100 py-2 fw-bold">
          전자문서 분석 요청
        </button>
      </div>
    </div>

    <div class="mt-3">
      <a href="/" class="btn btn-outline-secondary">
        ← 메인 로비로 돌아가기
      </a>
    </div>
  </div>
  <script>
  $(document).ready(function() {
      $("#btnUploadPdf").click(function() {
          if(!$("#pdfFile").val()) {
              alert("업로드할 PDF 파일을 선택해 주세요.");
              return;
          }

          let formData = new FormData();
          formData.append("file", $("#pdfFile")[0].files[0]);

          $.ajax({
              url: '/api/pdf/upload',
              type: 'POST',
              headers: {
                "Authorization": "Bearer " + localStorage.getItem("jwtToken")
              },
              data: formData,
              processData: false,
              contentType: false,
              success: function(res) {
                  alert(res);
                  window.location.href = "/";
              },
              error: function(xhr) {
                  alert("PDF 분석 실패: " + xhr.responseText);
              }
          });
      });
  });
  </script>
</body>
</html>

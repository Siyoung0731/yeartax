<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연말정산 - 부양가족 등록</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-light">
  <div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow">
      <div class="card-header bg-success text-white">
        <h5 class="mb-0">👨‍👩‍👧 인적공제 부양가족 등록</h5>
      </div>
      <div class="card-body">
        <form id="dependentForm">
          <div class="mb-3">
            <label for="relation" class="form-label">관계</label>
            <select id="relation" class="form-select">
              <option value="배우자">배우자</option>
              <option value="직계비속(자녀)">직계비속(자녀)</option>
              <option value="직계존속(부모)">직계존속(부모)</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="name" class="form-label">이름</label>
            <input type="text" id="name" class="form-control" required>
          </div>

          <div class="mb-3">
            <label for="identityNo" class="form-label">주민등록번호</label>
            <input type="text" id="identityNo" class="form-control" required>
          </div>

          <div class="mb-3 form-check">
            <input type="checkbox" id="isPathfinder" class="form-check-input" value="Y">
            <label for="isPathfinder" class="form-check-label">만 70세 이상 경로우대 대상자</label>
          </div>

          <button type="button" id="btnSubmit" class="btn btn-success w-100">부양가족 추가</button>
        </form>
      </div>
    </div>
    <div class="mt-3">
      <a href="/" class="btn btn-outline-secondary">&larr; 메인 로비로 돌아가기</a>
    </div>
  </div>

  <script>
    $(document).ready(function() {
      $('#btnSubmit').click(function() {
        const $btn = $('#btnSubmit');
        $btn.prop("disabled", true);

        let isChecked = $("#isPathfinder").is(":checked") ? "Y" : "N";

        $.ajax({
          url: '/api/dependent/add',
          type: 'POST',
          headers: {
            "Authorization": "Bearer " + localStorage.getItem("jwtToken")
          },
          data: {
            relation: $("#relation").val(),
            name: $("#name").val(),
            identityNo: $("#identityNo").val(),
            isPathfinder: isChecked
          },
          success: function(res) {
            alert(res);
            $("#dependentForm")[0].reset();
            window.location.href = "/";
          },
          error: function(xhr) {
            alert("등록 실패 " + xhr.responseText);
          },
          complete: function() {
            $btn.prop("disabled", false);
          }
        });
      });
    });
  </script>
</body>
</html>

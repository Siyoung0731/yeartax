<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>사내 연말정산 시스템 - 로그인</title>
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 400px;">
  <div class="card p-4">
    <h3 class="text-center">로그인</h3>
    <div class="mb-3">
      <label>사번</label>
      <input type="text" id="jobId" class="form-control" placeholder="1234">
    </div>
    <div class="mb-3">
      <label>비밀번호</label>
      <input type="password" id="password" class="form-control" placeholder="pwd1234">
    </div>
    <button onclick="login()" class="btn btn-primary w-100">로그인</button>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
  function login() {
    const loginData = {
      jobId: $('#jobId').val(),
      password: $('#password').val()
    };

    $.ajax({
      url: '/api/login',
      method: 'POST',
      contentType: 'application/json',
      data: JSON.stringify(loginData),
      success: function(response) {
        //1. 서버가 준 토큰을 브라우저 저장소(localStorage)에 저장
        localStorage.setItem("jwtToken", response.token);

        //2. 백엔드에서 보낸 '최초 로그인(비밀번호 변경 필요)' 여부 확인
        if(response.requirePasswordChange == true) {
          alert(response.message);
          window.location.href="/view/change-password";
        } else {
          alert("로그인 성공");
          window.location.href="/";
        }
      },
      error: function() {
        alert("로그인 실패: 아이디 또는 비밀번호를 확인하세요.");
      }
    });
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연말정산 환급 예상</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<style>
  body { background-color: #f8f9fa; }
  .dashboard-card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); border: none; }
  .chart-container { position: relative; height: 300px; width: 100%; display: flex; justify-content: center; }
</style>
<body>
  <div class="container mt-5">
    <div class="row mb-4">
      <div class="col-12 text-center">
        <h2 class="fw-bold">2026년 귀속 사내 연말정산</h2>
        <p class="text-muted">홍길동 사원님의 현재 정산 진행 현황입니다.</p>
        <button onclick="logout()" class="btn btn-sm btn-light ms-2 border" style="font-size: 0.8rem;">로그아웃</button>
      </div>
    </div>

    <div class="row">
      <div class="col-md-7 mb-4">
        <div class="card dashboard-card h-100 p-4">
          <h4 class="card-title fw-bold text-center mb-4">💰 나의 예상 환급액</h4>

          <div class="chart-container" style="height: 300px; width: 100%;">
            <canvas id="refundChart"></canvas>
          </div>

          <div class="text-center mt-4">
            <h3 class="fw-bold text-primary" id="displayAmount">+ 1,500,000 원</h3>
            <p class="text-muted small">* 위 금액은 현재까지 입력된 자료를 바탕으로 한 가계산 결과입니다.</p>
          </div>
        </div>
      </div>

      <div class="col-md-5 mb-4">
        <div class="card dashboard-card h-100 p-4">
          <h4 class="card-title fw-bold mb-4">🚀 빠른 메뉴 (Quick Links)</h4>

          <div class="d-grid gap-3">
            <a href="/pdf-upload.html" class="btn btn-outline-primary btn-lg text-start">
              📄 1. 국세청 간소화 PDF 업로드
            </a>
            <a href="/dependent-register.html" class="btn btn-outline-success btn-lg text-start">
              👨‍👩‍👧‍👦 2. 부양가족(인적공제) 등록
            </a>
            <a href="/" class="btn btn-secondary mb-3">⬅️ 메인으로 돌아가기</a>
            <a href="/evidence-upload.html" class="btn btn-outline-warning btn-lg text-start">
              🧾 3. 누락분 수동 영수증 제출
            </a>
            <a href="/" class="btn btn-secondary mb-3">⬅️ 메인으로 돌아가기</a>
            <a href="/admin-evidence.html" class="btn btn-dark btn-lg text-start">
              🔒 [관리자 전용] 영수증 결재함
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    // 1. 차트 객체를 담을 변수 - 전역 변수로 차트 객체 선언
    let refundChart = null;   

    function renderRefundChart(refundAmount) {
      const ctx = document.getElementById('refundChart').getContext('2d');
      const totTax = 3000000;

      //2. 이미 차트가 존재한다면 (중복 방지)
      if(refundChart) {
        refundChart.destroy();
      }

      //3. 새 차트 생성 - 데이터 값이 들어왔을 때만 생성
      refundChart = new Chart(ctx, {
        type: "doughnut",
        data: {
          labels: ['현재 환급액', '나머지 세액'],
          datasets: [{
            data: [refundAmount, totTax - refundAmount],
            backgroundColor: ['#0d6efd', '#e9ecef'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,   // 캔버스 크기 제어
          cutout: '75%'
        }
      });
    }

    // Ajax 호출 로직
    $(document).ready(function() {
      const token = localStorage.getItem("jwtToken");

      if(!token) {
        alert("로그인이 필요한 서비스입니다.");
        window.location.href="/login.html";
        return;     // 아래쪽 차트 그리는 로직이 실행되지 않도록 막음
      }

      // 서버에서 데이터 가져오기
      $.ajax({
        url: '/api/dashboard/1234',
        type: 'GET',
        headers: {
          "Authorization": "Bearer " + localStorage.getItem("jwtToken")
        },
        success: function(data) {
          console.log("받아온 데이터: " + data);    // F12 콘솔에서 확인 가능

          const amount = data.resultAmount || 0;
          $('#displayAmount').text('+ ' + amount.toLocaleString() + ' 원');
          renderRefundChart(amount);    // 받은 데이터로 차트 그리기
        },
        error: function(xhr) {
          if(xhr.status == 403 || xhr.status == 401) {
            alert("로그인이 만료되었거나 권한이 없습니다. 다시 로그인해주세요.")
            window.location.href = "/login";
          }
          
        }
      });
    });

    function logout() {
      //1. 브라우저 저장소(localStorage)에서 토큰 완전히 삭제
      localStorage.removeItem("jwtToken");

      //2. 사용자에게 알림을 띄움
      alert("로그아웃 되었습니다.");

      //3. 로그인 페이지로 강제 이동
      window.location.href="/login.html";
    }
  </script>
</body>
</html>

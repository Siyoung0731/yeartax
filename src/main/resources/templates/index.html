<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연말정산 환급 예상</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <section id="step-upload" class="step">
      <h1>연말정산 환급 예상</h1>
      <p>PDF 파일을 올려주세요.</p>

      <input type="file" id="pdfFile" name="pdfFile" accept="application/pdf">
      <button id="uploadBtn">환급액 확인하기</button>
    </section>

    <section id="step-loading" class="step hidden">
      <div class="spinner"></div>
        <h2>열심히 계산 중입니다...</h2>
        <p id="statusText">PDF 분석 중...</p>       
    </section>

    <section id="step-result" class="step hidden">
      <h1>예상 환급액</h1>

      <strong id="refundAmount">0원</strong>

      <p>
        처리 번호:
        <span id="jobIdText">-</span>
      </p>

      <p id="resultGuide">
        실제 환급액은 국세청 최종 신고 결과와 다를 수 있습니다.
      </p>

      <button id="restartBtn">다시 해보기</button>
    </section>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>

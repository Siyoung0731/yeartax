<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재무팀 - 수동 영수증 결제함</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-light">
  
  <div class="container mt-5">
    <h3 class="mb-4">💼 재무팀 수동 증빙 결재함</h3>

    <div class="card shadow-sm">
      <div class="card-body">
        <table class="table table-hover align-middle text-container">
          <thead class="table-dark">
            <tr>
              <td>영수증 번호</td>
              <td>정산 ID(사원)</td>
              <td>항목</td>
              <td>청구 금액</td>
              <td>상태</td>
              <td>결재 관리</td>
            </tr>
          </thead>
          <tbody id="evidenceList">
          </tbody>
        </table>
        <div id="emptyMessage" class="text-center text-muted mt-3" style="display: none;">
          대기 중인 결재 건이 없습니다.
        </div>
      </div>
    </div>
    <div class="mt-3">
      <a href="/" class="btn btn-outline-secondary">&larr; 메인 로비로 돌아가기</a>
    </div>
  </div>
  <script>
    $(document).ready(function() {
      // 1. 화면이 켜지자마자 대기 중(PENDING)인 목록 불러오기
      loadPendingList();

      // 2. 공통 함수 loadPendingList() : 로컬 스토리지에서 토큰 가져오기
      function getJwtToken() {
        return localStorage.getItem('jwtToken');
      }

      function loadPendingList() {
        $.ajax({
          url: '/api/evidence/admin/pending-list',
          type: 'GET',
          // 백엔드에 요청하기 직전 헤더에 JWT 토큰을 넣음
          beforeSend: function(xhr) {
            let token = getJwtToken();
            if(token) {
              xhr.setRequestHeader('Authorization', 'Bearer ' + token);
            }
          },
          success: function(data) {
            let $tbody = $('#evidenceList');
            $tbody.empty();

            if(data.length == 0) {
              $("#emptyMessage").show();
            } else {
              $("#emptyMessage").hide();
              // 2. 서버에서 받은 데이터를 표(table)로 그리기
              data.forEach(function(item) {
                let row = `
                    <tr>
                      <td>${item.evidenceId}</td>
                      <td>${item.yearTax.jobId}</td>
                      <td><span class="badge bg-secondary">${item.category}</span></td>
                      <td class="fw-bold">${item.amount.toLocaleString()}원</td>
                      <td><span class="badge bg-warning text-dark">${item.status}</span></td>
                      <td>
                        <button class="btn btn-success btn-sm btn-approve" data-id="${item.evidenceId}">  
                          승인하기
                        </button>
                      </td>
                    </tr>
                `;
                $tbody.append(row);
              });
            }
          },
          error: function(xhr) {
            if(xhr.status == 403) {
              alert("관리자 권한이 없거나 만료되었습니다.");
            } else {
              alert("목록을 불러오는 데 실패했습니다.");
            }
          }
        });
      }
      //3. '승인하기' 버튼 클릭 이벤트 (동적으로 생성된 버튼 처리)
      $(document).on("click", ".btn-approve", function() {
        let evidenceId = $(this).data("id");

        if(confirm(evidenceId + "번 영수증을 승인하시겠습니까? (환급액에 즉시 반영됩니다.)")) {
          $.ajax({
            url: '/api/evidence/admin/approve/' + evidenceId,
            type: 'POST',
            beforeSend: function(xhr) {
              let token = getJwtToken();
              if(token) {
                xhr.setRequestHeader('Authorization', 'Bearer ' + token);
              }
            },
            success: function(response) {
              alert(response);      // 서버에서 "승인 완료" 등의 텍스트를 보낸다고 가정
              loadPendingList();    //승인 완료 후 목록 다시 새로고침
            },
            error: function(xhr) {
              if(xhr.status == 403) {
                alert("권한이 없습니다.");
              } else {
                alert("승인 처리 중 오류가 발생했습니다.");
              }
            }
          });
        }
      });
    });
  </script>
</body>
</html>

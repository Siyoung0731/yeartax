spring.application.name=yeartax
server.port=9090

# 1. Oracle DB 연결 주소 (내비게이션 목적지)
# 주의: Oracle Free 버전은 기본 서비스 이름으로 'FREEPDB1'을 가장 많이 사용합니다.
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1

# 2. 계정 정보 (출입증)
# Docker를 실행할 때 설정했던 아이디와 비밀번호를 적어주세요.
spring.datasource.username=system
spring.datasource.password=1234

# 3. 드라이버 설정 (통역사)
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# 4. SQL 로그 확인 (선택 사항이지만 강력 추천)
# MyBatis나 JPA가 DB에 날리는 쿼리를 터미널에서 예쁘게 보여줍니다.
spring.datasource.hikari.maximum-pool-size=5
logging.level.org.hibernate.SQL=debug
logging.level.org.springframework.jdbc.core.JdbcTemplate=debug
